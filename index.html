<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth - Login & Register</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0d0d0d;
    --paper: #f5f0e8;
    --accent: #c84b31;
    --muted: #9e9a94;
    --border: #d8d2c6;
    --surface: #fff;
  }
  body {
    min-height: 100vh;
    background: var(--paper);
    font-family: 'DM Sans', sans-serif;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  /* Left panel */
  .left {
    background: var(--ink);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
    position: relative;
    overflow: hidden;
  }
  .left::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, #c84b31 0%, transparent 70%);
    top: -100px; right: -100px;
    opacity: 0.25;
  }
  .left::after {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, #e8a87c 0%, transparent 70%);
    bottom: -80px; left: -80px;
    opacity: 0.2;
  }
  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 24px;
    position: relative; z-index: 1;
  }
  .brand span { color: var(--accent); }
  .tagline {
    color: rgba(255,255,255,0.5);
    font-size: 16px;
    line-height: 1.7;
    max-width: 340px;
    position: relative; z-index: 1;
  }
  .dots {
    display: flex; gap: 8px; margin-top: 48px;
    position: relative; z-index: 1;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
  }
  .dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
  /* Right panel */
  .right {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
  }
  .card {
    width: 100%;
    max-width: 400px;
  }
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 36px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.3s;
    letter-spacing: 0.5px;
  }
  .tab.active { color: var(--ink); border-color: var(--accent); }
  .form-panel { display: none; }
  .form-panel.active { display: block; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .form-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .form-sub { color: var(--muted); font-size: 14px; margin-bottom: 30px; }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input[type="text"], input[type="email"], input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--surface);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,75,49,0.1);
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .checkbox-row input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .checkbox-row label {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
    color: var(--muted);
    cursor: pointer;
    margin: 0;
  }
  .checkbox-row a { color: var(--accent); text-decoration: none; }
  .forgot { text-align: right; margin-bottom: 24px; }
  .forgot a { color: var(--accent); font-size: 13px; text-decoration: none; }
  .btn-primary {
    width: 100%;
    padding: 15px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:hover { background: #222; }
  .btn-primary:active { transform: scale(0.99); }
  .divider {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin: 20px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%; width: 42%;
    height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  .social-btns { display: flex; gap: 12px; }
  .btn-social {
    flex: 1;
    padding: 11px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    transition: border-color 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-social:hover { border-color: var(--ink); }
  .strength-bar { display: flex; gap: 4px; margin-top: 8px; }
  .strength-seg { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 12px 24px;
    border-radius: 8px; font-size: 14px; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
    border-left: 4px solid var(--accent);
  }
  .toast.show { opacity: 1; }
  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; }
    .left { display: none; }
    .right { padding: 40px 24px; }
  }
</style>
</head>
<body>

<div class="left">
  <div class="brand">Welcome<br>back to <span>Lumina.</span></div>
  <p class="tagline">A minimal space to manage your work, ideas, and creative projects — beautifully.</p>
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div class="right">
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign In</div>
      <div class="tab" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="form-title">Sign in</div>
      <div class="form-sub">Good to have you back.</div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button class="btn-primary" onclick="handleLogin()">Sign In</button>

      <div class="divider">or continue with</div>
      <div class="social-btns">
        <button class="btn-social">🌐 Google</button>
        <button class="btn-social">🐙 GitHub</button>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panel-register">
      <div class="form-title">Create account</div>
      <div class="form-sub">Start your journey today.</div>

      <div class="field-row">
        <div class="field">
          <label>First name</label>
          <input type="text" id="reg-first" placeholder="Jane">
        </div>
        <div class="field">
          <label>Last name</label>
          <input type="text" id="reg-last" placeholder="Doe">
        </div>
      </div>
      <div class="field">
        <label>Email address</label>
        <input type="email" id="reg-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Min. 8 characters" oninput="checkStrength(this.value)">
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="terms">
        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>
      <button class="btn-primary" onclick="handleRegister()">Create Account</button>

      <div class="divider">or continue with</div>
      <div class="social-btns">
        <button class="btn-social">🌐 Google</button>
        <button class="btn-social">🐙 GitHub</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  const idx = tab === 'login' ? 0 : 1;
  document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

function showToast(msg, success=true) {
  const t = document.getElementById('toast');
  t.textContent = (success ? '✓ ' : '✕ ') + msg;
  t.style.borderLeftColor = success ? '#4caf50' : '#c84b31';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function handleLogin() {
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) return showToast('Please fill all fields', false);

  const form = new FormData();
  form.append('email', email);
  form.append('password', pass);

  const res = await fetch('login.php', { method: 'POST', body: form });
  const data = await res.json();
  if (data.success) {
    showToast(data.message);
    setTimeout(() => window.location.href = 'dashboard.php', 1500);
  } else {
    showToast(data.error, false);
  }
}

async function handleRegister() {
  const first = document.getElementById('reg-first').value.trim();
  const last = document.getElementById('reg-last').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const terms = document.getElementById('terms').checked;

  if (!first || !last || !email || !pass) return showToast('Please fill all fields', false);
  if (!terms) return showToast('Please accept the terms', false);

  const form = new FormData();
  form.append('first_name', first);
  form.append('last_name', last);
  form.append('email', email);
  form.append('password', pass);

  const res = await fetch('register.php', { method: 'POST', body: form });
  const data = await res.json();
  if (data.success) {
    showToast(data.message);
    setTimeout(() => window.location.href = 'dashboard.php', 1500);
  } else {
    showToast(data.error, false);
  }
}

function checkStrength(val) {
  const segs = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
  const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71'];
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  segs.forEach((s, i) => {
    s.style.background = i < score ? colors[score - 1] : '#d8d2c6';
  });
}
</script>
</body>
</html>
